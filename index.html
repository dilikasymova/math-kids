<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Математика с Мишкой 🐻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #6EC6F5;
    --grass: #5DD97A;
    --sun: #FFD23F;
    --coral: #FF6B6B;
    --purple: #A78BFA;
    --white: #FFFFFF;
    --dark: #2D2D2D;
    --card: #FFFDF7;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--sky) 0%, #b8ecff 40%, #d4f7e0 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px 16px 32px;
    overflow-y: auto;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 12px; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── BEAR ── */
  .bear-wrap { position: relative; width: 90px; height: 90px; }
  .bear { font-size: 72px; line-height: 1; display: block; text-align: center;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,.15));
    transition: transform .2s; }
  .bear.bounce { animation: bearBounce .5s ease; }
  .bear.shake  { animation: bearShake .5s ease; }
  @keyframes bearBounce {
    0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-20px) rotate(-8deg)} 60%{transform:translateY(-8px) rotate(5deg)}
  }
  @keyframes bearShake {
    0%,100%{transform:rotate(0)} 20%{transform:rotate(-10deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-6deg)} 80%{transform:rotate(6deg)}
  }

  /* ── BUBBLE ── */
  .bubble {
    background: var(--white);
    border-radius: 22px;
    padding: 10px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    font-size: 1.1rem;
    color: var(--dark);
    line-height: 1.5;
    text-align: center;
    max-width: 340px;
    position: relative;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 50%; transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: var(--white);
  }

  /* ── TITLE ── */
  .title {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--white);
    text-shadow: 0 3px 8px rgba(0,0,0,.2);
    text-align: center;
  }
  .subtitle { font-size: 1rem; color: rgba(255,255,255,.85); text-align: center; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    width: 100%;
    box-shadow: 0 6px 24px rgba(0,0,0,.1);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
    text-align: center;
  }

  /* ── BUTTON GROUPS ── */
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  .btn {
    border: none; cursor: pointer; font-family: inherit; font-weight: 700;
    border-radius: 16px; transition: transform .12s, box-shadow .12s;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(.94); }

  .btn-op {
    font-size: 1.3rem;
    padding: 14px 22px;
    background: var(--white);
    border: 3px solid transparent;
    color: var(--dark);
    box-shadow: 0 3px 10px rgba(0,0,0,.1);
    flex: 1; min-width: 90px;
  }
  .btn-op.selected { border-color: var(--purple); background: #f0ecff; }

  .btn-level {
    font-size: 1rem; padding: 10px 10px;
    background: var(--white); border: 3px solid transparent; color: var(--dark);
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
    flex: 1; min-width: 80px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .lvl-icon { font-size: 1.1rem; line-height: 1; }
  .lvl-text { display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
  .lvl-text b { font-size: .78rem; }
  .lvl-text small { font-size: .68rem; color: #888; }
  .btn-level.selected { border-color: var(--grass); background: #e8fded; }

  .btn-start {
    font-size: 1.25rem; padding: 16px 40px;
    background: linear-gradient(135deg, var(--grass), #38c85a);
    color: var(--white);
    box-shadow: 0 6px 18px rgba(93,217,122,.5);
    border-radius: 50px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(93,217,122,.55); }

  /* ── SCORE BAR ── */
  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; background: rgba(255,255,255,.55);
    border-radius: 18px; padding: 10px 18px;
    backdrop-filter: blur(6px);
  }
  .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .score-label { font-size: .72rem; color: #666; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .score-val { font-size: 1.4rem; font-weight: 900; color: var(--dark); }

  /* ── QUESTION ── */
  .question-box {
    background: var(--card);
    border-radius: 28px;
    padding: 16px;
    width: 100%;
    text-align: center;
    box-shadow: 0 6px 28px rgba(0,0,0,.1);
  }
  .question-text { font-size: 2.2rem; font-weight: 900; color: var(--dark); line-height: 1.2; }
  .answer-display {
    margin-top: 14px;
    font-size: 2rem; font-weight: 900;
    color: var(--purple);
    min-height: 2.4rem;
    letter-spacing: .08em;
  }

  /* ── DIGIT BUTTONS ── */
  .digit-pad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 100%;
  }
  .btn-digit {
    font-size: 1.3rem; padding: 11px 0;
    background: var(--white);
    color: var(--dark);
    box-shadow: 0 3px 8px rgba(0,0,0,.1);
    border-radius: 16px;
  }
  .btn-digit:hover { background: #f0ecff; }
  .btn-digit.del { background: #ffe8e8; color: var(--coral); font-size: 1.2rem; }
  .btn-digit.ok  { background: linear-gradient(135deg, var(--grass), #38c85a); color: var(--white); font-size: 1rem; }

  /* ── FEEDBACK ── */
  .feedback {
    width: 100%;
    border-radius: 20px;
    padding: 14px 18px;
    text-align: center;
    font-size: .95rem;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    max-height: 260px;
    overflow-y: auto;
  }
  .feedback.correct { background: #e5fded; color: #1a7a3a; display: block; }
  .feedback.wrong   { background: #fdeaea; color: #a02020; display: block; }
  .feedback .big    { font-size: 1.5rem; margin-bottom: 4px; display: block; }

  /* ── MISTAKES ── */
  .mistake-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 14px; border-radius: 14px;
    background: #fff8f8; margin-bottom: 8px;
    font-size: 1rem;
  }
  .mistake-row:last-child { margin-bottom: 0; }
  .mistake-q    { font-size: 1.2rem; font-weight: 900; color: #2D2D2D; min-width: 70px; }
  .mistake-user { color: #cc3333; font-size: .95rem; }
  .mistake-arrow{ color: #aaa; font-size: 1rem; }
  .mistake-right{ color: #1a7a3a; font-size: .95rem; }

  /* ── RESULT ── */
  .result-stars { font-size: 2.8rem; letter-spacing: 4px; }
  .result-score { font-size: 1.1rem; color: #555; text-align: center; }
  .result-score span { font-weight: 900; color: var(--dark); font-size: 1.4rem; }

  .btn-again {
    font-size: 1.1rem; padding: 14px 36px;
    background: linear-gradient(135deg, var(--coral), #ff4f4f);
    color: var(--white); border-radius: 50px;
    box-shadow: 0 6px 18px rgba(255,107,107,.4);
  }
  .btn-menu {
    font-size: 1rem; padding: 12px 30px;
    background: var(--white); color: var(--dark); border-radius: 50px;
    box-shadow: 0 3px 10px rgba(0,0,0,.1);
  }

  /* ── NEXT BTN ── */
  .btn-next {
    font-size: 1.1rem; padding: 14px 36px;
    background: linear-gradient(135deg, var(--sky), #3aa8e8);
    color: var(--white); border-radius: 50px;
    box-shadow: 0 6px 18px rgba(110,198,245,.5);
    display: none;
  }

  .btn-home {
    font-size: 1.2rem; padding: 6px 10px;
    background: rgba(255,255,255,.7);
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
    color: var(--dark);
  }
  .btn-home:hover { background: #ffe8e8; }

  /* ── EXPLAIN BOX ── */
  .explain-box { margin-top: 12px; }
  .explain-steps { display: flex; flex-direction: column; gap: 6px; }
  .step { font-size: .95rem; font-weight: 700; color: #a02020; }
  .step-eq {
    font-size: 1.2rem; font-weight: 900;
    background: #fff; border-radius: 12px; padding: 8px 14px;
    color: #2D2D2D; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .step-final {
    font-size: 1.15rem; font-weight: 900;
    background: #e5fded; border-radius: 12px; padding: 10px 14px;
    color: #1a7a3a; text-align: center;
    margin-top: 4px;
  }
  .step-hint { font-size: .85rem; color: #666; font-weight: 400; }
  .decomp {
    display: inline-block;
    background: #fff3cd;
    border-radius: 8px;
    padding: 2px 10px;
    font-weight: 900;
    color: #b85c00;
    font-size: 1.05rem;
    letter-spacing: .04em;
  }
  .streak-badge {
    display: inline-block; margin-top: 6px;
    background: linear-gradient(135deg, #FFD23F, #FF9F43);
    color: #fff; border-radius: 50px; padding: 4px 14px;
    font-size: .9rem; font-weight: 900;
    box-shadow: 0 3px 10px rgba(255,159,67,.4);
  }

  /* ── LANG TOGGLE ── */
  .lang-bar {
    display: flex; gap: 8px; justify-content: center;
    width: 100%;
  }
  .btn-lang {
    font-size: 1.1rem; padding: 8px 18px;
    background: rgba(255,255,255,.5);
    border-radius: 50px; border: 2px solid transparent;
    cursor: pointer; font-family: inherit; font-weight: 700;
    transition: all .15s;
  }
  .btn-lang.active {
    background: var(--white);
    border-color: var(--purple);
    box-shadow: 0 2px 8px rgba(167,139,250,.3);
  }

  /* ── STATS BUTTON ── */
  .btn-stats {
    font-size: .95rem; padding: 12px 24px;
    background: rgba(255,255,255,.6);
    color: #555; border-radius: 50px;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
    backdrop-filter: blur(6px);
  }
  .btn-clear {
    font-size: .95rem; padding: 12px 24px;
    background: #fff0f0; color: #cc3333; border-radius: 50px;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
  }

  /* ── STATS ROWS ── */
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 1rem;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #666; }
  .stat-val   { font-weight: 900; color: var(--dark); font-size: 1.1rem; }
  .stat-val.good { color: #1a7a3a; }
  .stat-val.bad  { color: #cc3333; }
  .stat-empty { color: #aaa; font-size: .95rem; text-align: center; padding: 10px 0; }

  .weak-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff8f8; border-radius: 12px; padding: 8px 14px; margin-bottom: 6px;
  }
  .weak-row:last-child { margin-bottom: 0; }
  .weak-expr { font-size: 1.1rem; font-weight: 900; }
  .weak-count { font-size: .85rem; color: #cc3333; font-weight: 700; }

  /* confetti */
  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .conf { position: absolute; width: 10px; height: 14px; border-radius: 3px; opacity: 0; animation: fall linear forwards; }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>

<!-- ══ MENU ══ -->
<div class="screen active" id="screen-menu">
  <div class="lang-bar">
    <button class="btn-lang active" onclick="setLang('ru')" id="lang-ru">🇷🇺 Русский</button>
    <button class="btn-lang" onclick="setLang('de')" id="lang-de">🇩🇪 Deutsch</button>
    <button class="btn-lang" onclick="setLang('en')" id="lang-en">🇬🇧 English</button>
  </div>
  <div class="bear-wrap"><span class="bear" id="bear-menu">🐻</span></div>
  <div class="bubble" id="menu-bubble">Привет! Я Мишка. Давай порешаем примеры вместе! 🍯</div>
  <div class="title" id="app-title">Математика<br>с Мишкой</div>

  <div class="card">
    <div class="card-title" id="lbl-op">Выбери действие</div>
    <div class="btn-group" id="op-group">
      <button class="btn btn-op selected" data-op="both">🔀 Всё вместе</button>
      <button class="btn btn-op" data-op="add">➕ Сложение</button>
      <button class="btn btn-op" data-op="sub">➖ Вычитание</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="lbl-lvl">Выбери уровень</div>
    <div class="btn-group" id="lvl-group">
      <button class="btn btn-level selected" data-lvl="1"><span class="lvl-icon">🌱</span><span class="lvl-text"><b>Лёгкий</b><small>до 100</small></span></button>
      <button class="btn btn-level" data-lvl="2"><span class="lvl-icon">⭐</span><span class="lvl-text"><b>Средний</b><small>до 200</small></span></button>
      <button class="btn btn-level" data-lvl="3"><span class="lvl-icon">🔥</span><span class="lvl-text"><b>Сложный</b><small>до 500</small></span></button>
    </div>
  </div>

  <button class="btn btn-start" onclick="startGame()">🚀 Начать!</button>
  <button class="btn btn-stats" onclick="showStats()">📊 Статистика для родителей</button>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="screen-game">
  <div class="score-bar">
    <div class="score-item"><span class="score-label" id="lbl-q">Вопрос</span><span class="score-val" id="q-num">1/10</span></div>
    <div class="score-item"><span class="score-label" id="lbl-correct">✅ Верно</span><span class="score-val" id="s-correct">0</span></div>
    <div class="score-item"><span class="score-label" id="lbl-wrong">❌ Ошибки</span><span class="score-val" id="s-wrong">0</span></div>
    <button class="btn btn-home" onclick="confirmHome()" title="На главную">🏠</button>
  </div>

  <div class="bear-wrap"><span class="bear" id="bear-game">🐻</span></div>
  <div class="bubble" id="bear-say">Сколько будет?</div>

  <div class="question-box">
    <div class="question-text" id="q-text">5 + 3 = ?</div>
    <div class="answer-display" id="ans-display">_</div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="digit-pad" id="digit-pad">
    <button class="btn btn-digit" onclick="digitPress('1')">1</button>
    <button class="btn btn-digit" onclick="digitPress('2')">2</button>
    <button class="btn btn-digit" onclick="digitPress('3')">3</button>
    <button class="btn btn-digit" onclick="digitPress('4')">4</button>
    <button class="btn btn-digit" onclick="digitPress('5')">5</button>
    <button class="btn btn-digit" onclick="digitPress('6')">6</button>
    <button class="btn btn-digit" onclick="digitPress('7')">7</button>
    <button class="btn btn-digit" onclick="digitPress('8')">8</button>
    <button class="btn btn-digit" onclick="digitPress('9')">9</button>
    <button class="btn btn-digit" onclick="digitPress('0')">0</button>
    <button class="btn btn-digit del" onclick="digitDel()">⌫</button>
    <button class="btn btn-digit" onclick="digitPress('-')" id="btn-minus" style="display:none">−</button>
    <button class="btn btn-digit ok" onclick="checkAnswer()" style="grid-column: span 2" id="btn-ok">✓ ОК</button>
  </div>

  <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Следующий ➡️</button>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="screen-result">
  <div class="bear-wrap"><span class="bear" id="bear-result">🐻</span></div>
  <div class="bubble" id="result-msg">Молодец!</div>
  <div class="card" style="text-align:center; gap:12px; display:flex; flex-direction:column; align-items:center">
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
    <div class="result-score" id="res-summary">Правильных: <span id="res-correct">0</span> из 10</div>
  </div>
  <div class="card" id="mistakes-card" style="display:none">
    <div class="card-title" id="mistakes-title">📋 Разбор ошибок</div>
    <div id="mistakes-list"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-again" onclick="startGame()" id="btn-again">🔄 Ещё раз!</button>
    <button class="btn btn-menu" onclick="goMenu()" id="btn-menu-result">🏠 Меню</button>
  </div>
</div>

<!-- ══ STATS ══ -->
<div class="screen" id="screen-stats">
  <div class="bear-wrap"><span class="bear">🐻</span></div>
  <div class="title" style="font-size:1.6rem" id="stats-main-title">📊 Статистика</div>

  <div class="card" id="stats-today">
    <div class="card-title" id="stats-today-title">📅 Сегодня</div>
    <div id="stats-today-body"></div>
  </div>

  <div class="card" id="stats-week">
    <div class="card-title" id="stats-week-title">📈 За 7 дней</div>
    <div id="stats-week-body"></div>
  </div>

  <div class="card" id="stats-weak">
    <div class="card-title" id="stats-weak-title">🎯 Слабые места</div>
    <div id="stats-weak-body"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-menu" onclick="goMenu()" id="btn-stats-back">← Назад</button>
    <button class="btn btn-clear" onclick="clearStats()" id="btn-stats-clear">🗑 Очистить</button>
  </div>
</div>

<!-- ══ CUSTOM MODAL ══ -->
<div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:24px; padding:28px 24px; max-width:320px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="font-size:2rem; margin-bottom:8px" id="modal-icon">🐻</div>
    <div style="font-size:1.1rem; font-weight:700; color:#2D2D2D; margin-bottom:20px; line-height:1.4" id="modal-text"></div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="modalConfirm()" style="flex:1; padding:12px; border:none; border-radius:14px; background:linear-gradient(135deg,#FF6B6B,#ff4f4f); color:#fff; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit" id="modal-yes"></button>
      <button onclick="modalCancel()" style="flex:1; padding:12px; border:none; border-radius:14px; background:#f0f0f0; color:#555; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit" id="modal-no"></button>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
// ── Переводы ──
const LANG = {
  ru: {
    appTitle: 'Математика<br>с Мишкой', menuBubble: 'Привет! Я Мишка. Давай порешаем примеры вместе! 🍯',
    opLabel: 'Выбери действие',
    opAdd: '➕ Сложение', opSub: '➖ Вычитание', opBoth: '🔀 Всё вместе',
    lvlLabel: 'Выбери уровень',
    lvl1: '🌱 Лёгкий', lvl1sub: 'до 100',
    lvl2: '⭐ Средний', lvl2sub: 'до 200',
    lvl3: '🔥 Сложный', lvl3sub: 'до 500',
    startBtn: '🚀 Начать!',
    statsBtn: '📊 Статистика для родителей',
    qLabel: 'Вопрос', correctLabel: '✅ Верно', wrongLabel: '❌ Ошибки',
    bearAdd: 'Сколько будет? 🤔', bearSub: 'Посчитай! 🐾',
    bearCorrect: 'Ура, верно! 🎊', bearStreak: '🔥 Ты в ударе!',
    correctBig: '🎉 Правильно!',
    wrongBig: '😢 Не совсем...',
    wrongMsg: 'Ты написал', wrongRight: 'а правильно:',

function MOTIVATE_CORRECT() { return t('motivCorrect'); }
function MOTIVATE_WRONG()   { return t('motivWrong'); }
function STREAK_MSG()        { return t('streakMsg'); }

function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Объяснение вычитания через круглое число
function explainSubtraction(a, b) {
  // Метод разложения: разбиваем b на части так, чтобы каждый шаг попадал на круглое число
  // 43-16: 16=3+10+3 → 43-3=40 → 40-10=30 → 30-3=27
  if (b === 0) {
    return `<div class="explain-steps">
      <div class="step-final">✅ ${a} − 0 = <b>${a}</b>
      <div class="step-hint">${t('explainZero')}</div></div>
    </div>`;
  }
  if (a === b) {
    return `<div class="explain-steps">
      <div class="step-final">✅ ${a} − ${b} = <b>0</b>
      <div class="step-hint">${t('explainSame')}</div></div>
    </div>`;
  }

  const steps = [];
  let current = a;
  let remaining = b;
  const unitsA = a % 10;

  // Шаг 1: вычитаем единицы a, чтобы попасть на круглое число
  if (unitsA > 0 && unitsA <= remaining) {
    steps.push([current, unitsA, current - unitsA]);
    current -= unitsA;
    remaining -= unitsA;
  } else if (unitsA > 0 && unitsA > remaining) {
    steps.push([current, remaining, current - remaining]);
    current -= remaining;
    remaining = 0;
  }

  // Шаг 2: вычитаем десятки
  if (remaining >= 10) {
    const tens = Math.floor(remaining / 10) * 10;
    steps.push([current, tens, current - tens]);
    current -= tens;
    remaining -= tens;
  }

  // Шаг 3: вычитаем остаток единиц
  if (remaining > 0) {
    steps.push([current, remaining, current - remaining]);
    current -= remaining;
  }

  const decomp = steps.map(s => s[1]).join(' + ');
  let html = '<div class="explain-steps">';
  html += `<div class="step">💡 ${t('explainDecomp')} <b>${b}</b> ${t('explainParts')} <span class="decomp">${decomp}</span></div>`;
  steps.forEach(s => {
    html += `<div class="step-eq">${s[0]} − <b>${s[1]}</b> = <b>${s[2]}</b></div>`;
  });
  html += `<div class="step-final">✅ ${a} − ${b} = <b>${a - b}</b></div>`;
  html += '</div>';
  return html;
}

function explainAddition(a, b) {
  // Разбиваем b на десятки и единицы — понятно и без сюрпризов
  // 36 + 63: разложим 63 = 60 + 3 → 36+60=96 → 96+3=99
  const tensB  = Math.floor(b / 10) * 10;
  const unitsB = b % 10;

  const steps = [];
  let current = a;
  if (tensB > 0)  { steps.push([current, tensB,  current + tensB]);  current += tensB; }
  if (unitsB > 0) { steps.push([current, unitsB, current + unitsB]); current += unitsB; }

  if (steps.length === 0) {
    return `<div class="explain-steps"><div class="step-final">✅ ${a} + 0 = <b>${a}</b></div></div>`;
  }
  if (steps.length === 1) {
    return `<div class="explain-steps"><div class="step-final">✅ ${a} + ${b} = <b>${a + b}</b></div></div>`;
  }

  const decomp = steps.map(s => s[1]).join(' + ');
  let html = '<div class="explain-steps">';
  html += `<div class="step">💡 ${t('explainDecompAdd')} <b>${b}</b> ${t('explainPartsAdd')} <span class="decomp">${decomp}</span></div>`;
  steps.forEach(s => {
    html += `<div class="step-eq">${s[0]} + <b>${s[1]}</b> = <b>${s[2]}</b></div>`;
  });
  html += `<div class="step-final">✅ Итого: ${a} + ${b} = <b>${a + b}</b></div>`;
  html += '</div>';
  return html;
}

// ── Генерация вопроса ──
function rand(max) { return Math.floor(Math.random() * (max + 1)); } // всегда целое число

function newQuestion() {
  answered = false;
  currentAnswer = '';
  document.getElementById('ans-display').textContent = '_';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('digit-pad').style.display = 'grid';

  const max = lvl === 1 ? 100 : lvl === 2 ? 200 : 500;
  let useOp = op === 'both' ? (Math.random() > .5 ? 'add' : 'sub') : op;
  currentOp = useOp;

  let a, b;
  if (useOp === 'add') {
    a = rand(max); b = rand(max - a);
    rightAnswer = a + b;
    document.getElementById('q-text').textContent = `${a} + ${b} = ?`;
    document.getElementById('bear-say').textContent = t('bearAdd');
  } else {
    a = Math.max(1, rand(max)); b = rand(a);
    rightAnswer = a - b;
    document.getElementById('q-text').textContent = `${a} − ${b} = ?`;
    document.getElementById('bear-say').textContent = t('bearSub');
  }
  currentA = a; currentB = b;
  document.getElementById('btn-minus').style.display = 'none';
  document.getElementById('q-num').textContent = `${qIndex+1}/${TOTAL}`;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;

  bounceBear('bear-game');
}

// ── Цифровой ввод ──
function digitPress(d) {
  if (answered) return;
  if (d === '-' && currentAnswer.length > 0) return;
  if (currentAnswer.length >= 4) return;
  currentAnswer += d;
  document.getElementById('ans-display').textContent = currentAnswer || '_';
}
function digitDel() {
  if (answered) return;
  currentAnswer = currentAnswer.slice(0, -1);
  document.getElementById('ans-display').textContent = currentAnswer || '_';
}

// ── Проверка ──
function checkAnswer() {
  if (answered || currentAnswer === '' || currentAnswer === '-') return;
  answered = true;
  const userAns = parseInt(currentAnswer);
  const fb = document.getElementById('feedback');

  if (userAns === rightAnswer) {
    correct++;
    streak++;
    const motiv = randomFrom(MOTIVATE_CORRECT());
    const streakMsg = streak >= 2 && streak < STREAK_MSG().length ? STREAK_MSG()[streak] : null;
    fb.className = 'feedback correct';
    fb.innerHTML = `<span class="big">${t('correctBig')}</span>${motiv}${streakMsg ? `<br><span class="streak-badge">${streakMsg}</span>` : ''}`;
    document.getElementById('bear-say').textContent = streak >= 3 ? t('bearStreak') : t('bearCorrect');
    bounceBear('bear-game');
    // confetti fires in showResult, not here
  } else {
    wrong++;
    streak = 0;
    mistakeLog.push({ a: currentA, b: currentB, op: currentOp, userAns: userAns, right: rightAnswer });
    const motiv = randomFrom(MOTIVATE_WRONG());
    let explanation = currentOp === 'sub'
      ? explainSubtraction(currentA, currentB)
      : explainAddition(currentA, currentB);
    fb.className = 'feedback wrong';
    fb.innerHTML = `<span class="big">${t('wrongBig')}</span>${t('wrongMsg')} <b>${userAns}</b>, ${t('wrongRight')} <b>${rightAnswer}</b><br>${motiv}<br><div class="explain-box">${explanation}</div>`;
    document.getElementById('bear-say').textContent = randomFrom(MOTIVATE_WRONG()).replace(/[!🍀🌈📚💡🐻]/g, '').trim() + ' 🐻';
    shakeBear('bear-game');
  }

  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('digit-pad').style.display = 'none';

  qIndex++;
  // Показываем кнопку сразу в обоих случаях
  document.getElementById('btn-next').style.display = 'inline-flex';
  document.getElementById('btn-next').textContent = qIndex >= TOTAL ? t('finishBtn') : t('nextBtn');

  if (userAns === rightAnswer) {
    // Верно — автопереход через 2 сек, но можно нажать раньше
    autoNextTimer = setTimeout(() => {
      document.getElementById('btn-next').style.display = 'none';
      if (qIndex >= TOTAL) showResult();
      else newQuestion();
    }, 2000);
  } else {
    // Ошибка — только по кнопке, без таймера
    if (qIndex >= TOTAL) {
      document.getElementById('btn-next').textContent = t('finishBtn');
    }
  }
}

function nextQuestion() {
  if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
  document.getElementById('btn-next').style.display = 'none';
  if (qIndex >= TOTAL) showResult();
  else newQuestion();
}

// ── Результат ──
function showResult() {
  saveCurrentSession();
  show('screen-result');
  document.getElementById('res-correct').textContent = correct;

  const pct = correct / TOTAL;

  let stars, bearSay;
  if (pct === 1) {
    stars = '⭐⭐⭐'; bearSay = t('result10');
  } else if (pct >= .9) {
    stars = '⭐⭐⭐'; bearSay = `${correct} из ${TOTAL} — ${t('result9')}`;
  } else if (pct >= .7) {
    stars = '⭐⭐'; bearSay = `${correct} ${t('result7')}`;
  } else if (pct >= .5) {
    stars = '⭐'; bearSay = `${correct} ${t('result5')}`;
  } else if (pct >= .3) {
    stars = '🌱'; bearSay = t('result3');
  } else {
    stars = '🌱'; bearSay = t('result0');
  }

  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-msg').textContent = bearSay;
  document.getElementById('res-summary').innerHTML =
    `Правильных: <span style="font-weight:900;font-size:1.4rem">${correct}</span> из ${TOTAL} &nbsp;·&nbsp; Ошибок: <span style="font-weight:900;font-size:1.4rem;color:#e05">${wrong}</span>`;

  // Show mistakes breakdown
  const card = document.getElementById('mistakes-card');
  const list = document.getElementById('mistakes-list');
  if (mistakeLog.length === 0) {
    card.style.display = 'none';
    spawnConfetti();
  } else {
    card.style.display = 'block';
    const opSym = o => o === 'add' ? '+' : '−';
    list.innerHTML = mistakeLog.map(m => `
      <div class="mistake-row">
        <span class="mistake-q">${m.a} ${opSym(m.op)} ${m.b}</span>
        <span class="mistake-user">${t('youWrote')} <b>${m.userAns}</b></span>
        <span class="mistake-arrow">→</span>
        <span class="mistake-right">${t('correct')} <b>${m.right}</b></span>
      </div>
    `).join('');
    if (pct === 1) spawnConfetti();
  }

  bounceBear('bear-result');
}

// ── localStorage helpers (с fallback если заблокирован) ──
const STORAGE_KEY = 'mishka_stats_v1';
let _memoryStats = []; // fallback когда localStorage недоступен

function storageAvailable() {
  try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
  catch { return false; }
}

function loadStats() {
  if (!storageAvailable()) return _memoryStats;
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveSession(data) {
  const all = loadStats();
  all.push(data);
  if (all.length > 500) all.splice(0, all.length - 500);
  if (storageAvailable()) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(all)); } catch {}
  } else {
    _memoryStats = all;
  }
}

function clearStats() {
  const msgs = {
    ru: ['Удалить всю статистику?', 'Это действие нельзя отменить', 'Удалить', 'Отмена'],
    de: ['Statistiken löschen?', 'Diese Aktion kann nicht rückgängig gemacht werden', 'Löschen', 'Abbrechen'],
    en: ['Delete all statistics?', 'This action cannot be undone', 'Delete', 'Cancel'],
  };
  const m = msgs[currentLang] || msgs.ru;
  showModal('🗑️', `${m[0]} ${m[1]}`, m[2], m[3], () => {
    if (storageAvailable()) {
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
    }
    _memoryStats = [];
    showStats();
  });
}

// ── Save session when game ends ──
function saveCurrentSession() {
  saveSession({
    ts: Date.now(),
    total: TOTAL,
    correct: correct,
    wrong: wrong,
    op: op,
    lvl: lvl,
    mistakes: mistakeLog.map(m => `${m.a}${m.op === 'add' ? '+' : '-'}${m.b}`)
  });
}

// ── Show stats screen ──
function showStats() {
  show('screen-stats');
  // Update static labels
  const ids = {
    'stats-main-title': t('statsTitle'),
    'stats-today-title': t('statsToday'),
    'stats-week-title': t('statsWeek'),
    'stats-weak-title': t('statsWeak'),
    'btn-stats-back': t('statsBack'),
    'btn-stats-clear': t('statsClear'),
    'mistakes-title': t('mistakesTitle'),
  };
  Object.entries(ids).forEach(([id, val]) => { const el = document.getElementById(id); if(el) el.textContent = val; });

  // Показать предупреждение если localStorage недоступен
  const existing = document.getElementById('storage-warning');
  if (existing) existing.remove();
  if (!storageAvailable()) {
    const warn = document.createElement('div');
    warn.id = 'storage-warning';
    warn.style.cssText = 'background:#fff3cd;border-radius:14px;padding:10px 16px;font-size:.85rem;color:#856404;text-align:center;width:100%';
    warn.innerHTML = '⚠️ Статистика сохраняется только до закрытия вкладки.<br>Для постоянного хранения выложи на GitHub Pages.';
    document.getElementById('screen-stats').insertBefore(warn, document.getElementById('stats-today'));
  }

  const all = loadStats();

  const now = Date.now();
  const DAY = 86400000;
  const todaySessions = all.filter(s => now - s.ts < DAY);
  const weekSessions  = all.filter(s => now - s.ts < 7 * DAY);

  // ── TODAY ──
  const todayBody = document.getElementById('stats-today-body');
  if (todaySessions.length === 0) {
    todayBody.innerHTML = `<div class="stat-empty">${t('statsEmpty')}</div>`;
  } else {
    const tTotal   = todaySessions.reduce((s, x) => s + x.total, 0);
    const tCorrect = todaySessions.reduce((s, x) => s + x.correct, 0);
    const tPct     = Math.round(tCorrect / tTotal * 100);
    const firstTs  = Math.min(...todaySessions.map(s => s.ts));
    const lastTs   = Math.max(...todaySessions.map(s => s.ts));
    const mins     = Math.round((lastTs - firstTs) / 60000);
    todayBody.innerHTML = `
      <div class="stat-row"><span class="stat-label">Сессий сыграно</span><span class="stat-val">${todaySessions.length}</span></div>
      <div class="stat-row"><span class="stat-label">Примеров решено</span><span class="stat-val">${tTotal}</span></div>
      <div class="stat-row"><span class="stat-label">Правильных</span><span class="stat-val good">${tCorrect}</span></div>
      <div class="stat-row"><span class="stat-label">Точность</span><span class="stat-val ${tPct >= 70 ? 'good' : 'bad'}">${tPct}%</span></div>
      <div class="stat-row"><span class="stat-label">Время занятий</span><span class="stat-val">${mins < 1 ? '< 1' : mins} мин</span></div>
    `;
  }

  // ── WEEK ──
  const weekBody = document.getElementById('stats-week-body');
  if (weekSessions.length === 0) {
    weekBody.innerHTML = `<div class="stat-empty">${t('statsWeekEmpty')}</div>`;
  } else {
    // Group by day
    const byDay = {};
    weekSessions.forEach(s => {
      const d = new Date(s.ts);
      const key = `${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!byDay[key]) byDay[key] = { total: 0, correct: 0 };
      byDay[key].total   += s.total;
      byDay[key].correct += s.correct;
    });
    const wTotal   = weekSessions.reduce((s,x) => s + x.total, 0);
    const wCorrect = weekSessions.reduce((s,x) => s + x.correct, 0);
    const wPct     = Math.round(wCorrect / wTotal * 100);
    let dayRows = Object.entries(byDay).slice(-7).map(([d, v]) =>
      `<div class="stat-row"><span class="stat-label">${d}</span><span class="stat-val">${v.correct}/${v.total} (${Math.round(v.correct/v.total*100)}%)</span></div>`
    ).join('');
    weekBody.innerHTML = `
      <div class="stat-row"><span class="stat-label">Всего примеров</span><span class="stat-val">${wTotal}</span></div>
      <div class="stat-row"><span class="stat-label">Средняя точность</span><span class="stat-val ${wPct >= 70 ? 'good' : 'bad'}">${wPct}%</span></div>
      <div class="stat-row" style="border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:4px"><span class="stat-label" style="font-weight:700">По дням:</span></div>
      ${dayRows}
    `;
  }

  // ── WEAK SPOTS ──
  const weakBody = document.getElementById('stats-weak-body');
  const mistakeCounts = {};
  all.forEach(s => (s.mistakes || []).forEach(m => {
    mistakeCounts[m] = (mistakeCounts[m] || 0) + 1;
  }));
  const top = Object.entries(mistakeCounts).sort((a,b) => b[1]-a[1]).slice(0, 5);
  if (top.length === 0) {
    weakBody.innerHTML = `<div class="stat-empty">${t('statsWeakEmpty')}</div>`;
  } else {
    weakBody.innerHTML = top.map(([expr, cnt]) => {
      const sym = expr.includes('+') ? '+' : '−';
      const parts = expr.replace('+','-').split('-');
      const a = parts[0], b = parts[1];
      return `<div class="weak-row">
        <span class="weak-expr">${a} ${sym} ${b}</span>
        <span class="weak-count">ошибок: ${cnt}</span>
      </div>`;
    }).join('');
  }
}

// ── Custom modal ──
let _modalCallback = null;

function showModal(icon, text, yesText, noText, onYes) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-text').textContent = text;
  document.getElementById('modal-yes').textContent = yesText;
  document.getElementById('modal-no').textContent = noText;
  document.getElementById('modal-overlay').style.display = 'flex';
  _modalCallback = onYes;
}
function modalConfirm() {
  document.getElementById('modal-overlay').style.display = 'none';
  if (_modalCallback) _modalCallback();
  _modalCallback = null;
}
function modalCancel() {
  document.getElementById('modal-overlay').style.display = 'none';
  _modalCallback = null;
}

// ── Bear animations ──
function bounceBear(id) {
  const b = document.getElementById(id);
  b.classList.remove('bounce','shake');
  void b.offsetWidth;
  b.classList.add('bounce');
}
function shakeBear(id) {
  const b = document.getElementById(id);
  b.classList.remove('bounce','shake');
  void b.offsetWidth;
  b.classList.add('shake');
}

// ── Конфетти ──
function spawnConfetti() {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const colors = ['#FFD23F','#FF6B6B','#5DD97A','#6EC6F5','#A78BFA','#FF9F43'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${-20 - Math.random()*40}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      transform:rotate(${Math.random()*360}deg);
      animation-duration:${1.5 + Math.random()*1.5}s;
      animation-delay:${Math.random()*.6}s;
      width:${8+Math.random()*8}px;
      height:${10+Math.random()*10}px;
    `;
    wrap.appendChild(el);
  }
  setTimeout(() => wrap.innerHTML = '', 3500);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  if (e.key >= '0' && e.key <= '9') digitPress(e.key);
  if (e.key === 'Backspace') digitDel();
  if (e.key === 'Enter') answered ? nextQuestion() : checkAnswer();
});
</script>
